workflows:
  ios-release:
    name: iOS App Store Build
    max_build_duration: 60

    instance_type: mac_mini_m2
  
    integrations:
       app_store_connect: Codemagic
   
    environment:
      ios_signing:
        provisioning_profiles:
          - Recordar App Store

      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

      node: 18

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: cd ios/App && pod install

      - name: Build iOS
        script: |
          xcode-project use-profiles

          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration

      email:
        recipients:
          - meusalaoai@gmail.com