workflows:
  ios-release:
    name: iOS App Store Build
    max_build_duration: 60

    instance_type: mac_mini_m2

    environment:
      ios_signing:
        provisioning_profiles:
        - Recordar App Store

      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

      node: 18

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: cd ios/App && pod install

      - name: Build iOS
        script: |
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME" --archive-xcargs "CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=69TTU76KJR" --export-options-plist export_options.plist
          
    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - meusalaoai@gmail.com