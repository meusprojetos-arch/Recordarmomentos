<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" fill="none">
  <!-- Candle flame -->
  <ellipse cx="15" cy="5" rx="1.5" ry="2.2" fill="#FF6B35" opacity="0.7"/>
  <!-- Candle wick -->
  <line x1="15" y1="7" x2="15" y2="9" stroke="#FF6B35" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Cake top tier -->
  <rect x="10" y="10" width="10" height="5" rx="1.5" fill="#FF6B35" opacity="0.35" stroke="#FF6B35" stroke-width="1.5"/>
  <!-- Cake bottom tier -->
  <rect x="6" y="15" width="18" height="9" rx="2" fill="#FF6B35" opacity="0.18" stroke="#FF6B35" stroke-width="1.5"/>
  <!-- Frosting wave bottom tier -->
  <path d="M6 17 Q9 15.5 12 17 Q15 18.5 18 17 Q21 15.5 24 17" fill="none" stroke="#FF6B35" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Plate -->
  <line x1="4" y1="24" x2="26" y2="24" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round"/>
</svg>
